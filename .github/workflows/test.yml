name: Test CI

on:
  push:
    branches:
      - 'm*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: foodora_test
          POSTGRES_PASSWORD: foodora_test
          POSTGRES_DB: foodora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://foodora_test:foodora_test@localhost:5432/foodora_test
      JWT_SECRET: test-jwt-secret-at-least-32-bytes-long-for-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Nuxt typecheck
        run: npx nuxi typecheck

      - name: Run test suite
        run: pnpm test
